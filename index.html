<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="wrapper">
        <div class="left-side">
            <img src="images/leaf.avif" alt="">
            <div class="logo-section">
                <img src="images/odin-lined.png" alt="" srcset="" style="width: 150px;">
                <h1 id="logo-text">ODIN</h1>
            </div>
        </div>
        <div class="right-side">
            <div class="top-part">
                <div class="title">
                    <h1>This is not a real online service! You know you need something like this
                        in your life to help you realize your deepest dreams.
                        Sign up <em>now</em> to get started.
                        <br></br>
                        You know you want to.
                    </h1>
                </div>
            </div>
            <div class="form-part">
                <div class="text-part">
                    <p id="paragraph1">Please fill out <br>next sections.</br></p>
                </div>
                <div class="left-forms">
                    <label for="firstName">FIRST NAME</label>
                    <input type="text" id="firstName" placeholder="Bob...">

                    <label for="email">EMAIL</label>
                    <input type="email" id="email" placeholder="you@example.com">

                    <label for="password">PASSWORD</label>
                    <input type="password" id="password">
                </div>
                <div class="right-forms">
                    <label for="lastName">LAST NAME</label>
                    <input type="text" id="lastName" placeholder="Smith...">

                    <label for="phoneNumber">PHONE NUMBER</label>
                    <input type="text" id="phoneNumber" placeholder="123-456-789">

                    <label for="password">CONFIRM PASSWORD</label>
                    <input type="password" id="password">
                </div>
            </div>
            <div class="bottom-part">
                <button id="create-account" type="submit">
                    Create Account
                </button>
                <div class="already">
                    <p>Already have an account? <span id="log-in"><a href="index.html" style="text-decoration: none;">Log in</a></span></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
