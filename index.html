<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>PROJECT SIGN-UP FORM</title>
</head>

<body>
    <div class="wrapper">
        <div class="left-side">
            <img src="images/leaf.avif" alt="Credit Halie West" srcset="" id="image">
            <div class="logo-section">
                <img src="images/odin-lined.png" alt="TOP Logo" srcset="" id="logo">
                <p id="odin">Sign Up Form</p>
            </div>
        </div>

        <div class="right-side">
            <div class="header">
                <p id="heading">This is not a real online service! You know you need something like
                    this in your life to help you realize your deepest dreams.
                    <br>Sign up <em>now</em> to get started.</br>
                    <br>You know you want to!</br>
                </p>
            </div>

            <p id="mainP">Let's get started.</p>
            <div class="main">
                <div class="input-leftSide">
                    <label for="firstName">FIRST NAME</label>
                    <input type="text" name="firstname" id="firstName" required>
                    <label for="email">EMAIL</label>
                    <input type="email" name="email" id="email"required>
                    <label for="password">PASSWORD</label>
                    <input type="password" name="password" id="password" required>
                </div>

                <div class="input-rightSide">
                    <label for="lastName">LAST NAME</label>
                    <input type="text" name="lastname" id="lastName" required>
                    <label for="phoneNumber">PHONE NUMBER</label>
                    <input type="text" name="phonenumber" id="phoneNumber" required>
                    <label for="password">CONFIRM PASSWORD</label>
                    <input type="password" name="password" id="password" required>
                </div>
            </div>
            <div class="footer">
                <button id="create-acc">Create Account</button>
                <p>Already have an account? <a href="index.html"
                        style="text-decoration: none; font-weight: bolder; 
                    color: #596D48;">Log in</a></p>
            </div>
        </div>

    </div>
</body>

</html>
